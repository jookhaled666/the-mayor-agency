<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- SEO Meta Tags -->
  <title>The Mayor - Luxury Media Agency</title>
  <meta name="description" content="Elevate your brand with The Mayor's exclusive celebrities management, media production, and digital marketing services across Dubai and Egypt." />
  
  <!-- CDNs for dependencies -->
  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <!-- GSAP Core & ScrollTrigger & Flip -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Flip.min.js"></script>
  <!-- Lenis -->
  <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Google Fonts - Outfit for modern luxury -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Our CSS -->
  <link rel="stylesheet" href="./css/global.css" />
  <link rel="stylesheet" href="./css/skeuomorphism.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/home.css" />
</head>
<body>

  <!-- Persistent 3D Canvas Background -->
  <canvas id="earth-canvas"></canvas>

  <!-- Navigation / Header -->
  <header class="header">
    <div class="logo-container">
      <!-- Pulsating Logo Link provided by user -->
      <img src="https://image2url.com/r2/default/images/1775749027835-b0efb839-de21-496b-b49c-083b297fcd71.png" alt="The Mayor Logo" class="main-logo" />
      <div class="glow-effect"></div>
    </div>
    
    <div class="controls-container">
      <!-- Region Switch -->
      <div class="switch region-switch" id="region-switch">
        <span class="active" data-region="dubai">Dubai</span>
        <span data-region="egypt">Egypt</span>
        <div class="slider"></div>
      </div>
      
      <!-- Language Switch -->
      <div class="switch lang-switch" id="lang-switch">
        <span class="active" data-lang="en">EN</span>
        <span data-lang="ar">AR</span>
      </div>
    </div>

    <!-- Hamburger Toggle -->
    <div class="hamburger" id="nav-toggle">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </header>

  <!-- Fullscreen Navigation Menu -->
  <nav class="fullscreen-nav" id="fullscreen-nav">
    <ul class="nav-links">
      <li><a href="#" data-page="home">Home</a></li>
      <li><a href="#" data-page="services">Services</a></li>
      <li><a href="#" data-page="portfolio">Portfolio</a></li>
      <li><a href="#" data-page="about">About Us</a></li>
      <li><a href="#" data-page="contact">Contact Us</a></li>
    </ul>
    
    <div class="social-links">
      <a href="#" class="magnetic-icon"><i data-lucide="whatsapp"></i></a>
      <a href="#" class="magnetic-icon"><i data-lucide="facebook"></i></a>
      <a href="#" class="magnetic-icon"><i data-lucide="instagram"></i></a>
      <a href="#" class="magnetic-icon"><i data-lucide="linkedin"></i></a>
    </div>
  </nav>

  <!-- Main View Container for SPA -->
  <main id="app-view">
    <!-- Content logic injected here -->
  </main>

  <!-- Floating Magnetic WhatsApp Button -->
  <a href="https://wa.me/971563259250" target="_blank" class="floating-wa magnetic-btn" id="floating-wa">
    <i data-lucide="message-circle"></i>
  </a>

  <!-- Preloader Transition Overlay -->
  <div id="transition-preloader" class="preloader-overlay">
    <div class="preloader-content">
      <div class="map-icon-container">
        <i data-lucide="map" class="map-icon"></i>
      </div>
      <h2 id="preloader-text">Traveling to Destination...</h2>
      <div class="progress-bar"><div class="progress-fill"></div></div>
    </div>
  </div>

  <!-- Our JS Logic -->
  <script src="./js/home-data.js"></script>
  <script src="./js/data.js"></script>
  <script src="./js/three-scene.js"></script>
  <script src="./js/animations.js"></script>
  <script src="./js/app.js"></script>

  <script>
    lucide.createIcons();
  </script>
</body>
</html>
